# UFT.Prepare.MLUSetup — Prepare MLU content (3 parallel MSBuild prepare jobs)
# Jenkins: UFT.Prepare.All.MLU.Setup (MultiJobProject) — "04 - Prepare MLU"
#   Phase "Prepare All Setups" (PARALLEL, 3 jobs):
#     UFT.Prepare.RepView.Setup   → MSBTarget=PrepareUFTRepViewSetup_IHP2
#     UFT.Prepare.QCPlugin.Setup  → MSBTarget=PrepareQCPluginSetup_IHP2
#     UFT.Prepare.UFT.Setup       → MSBTarget=PrepareUFTSetup_IHP2
#   All use MSBProj=build\create_MLU_Content.proj

UFT.Prepare.MLUSetup.RepView:
  allow_failure: true
  extends: .uft-msbuild-template
  stage: setup-prepare-mlu
  variables:
    MSBProj: 'build\create_MLU_Content.proj'
    MSBTarget: "PrepareUFTRepViewSetup_IHP2"
    JobName: "UFT.Prepare.MLUSetup.RepView"
    MSBProj_For_Consumption: 'build\create_MLU_Content.proj'
  needs:
    - job: UFT.Setup.ALMAndBTP
      artifacts: false
    - job: uft-build-compute-version
      artifacts: true
    - job: uft-build-env-setup
      artifacts: true

UFT.Prepare.MLUSetup.QCPlugin:
  allow_failure: true
  extends: .uft-msbuild-template
  stage: setup-prepare-mlu
  variables:
    MSBProj: 'build\create_MLU_Content.proj'
    MSBTarget: "PrepareQCPluginSetup_IHP2"
    JobName: "UFT.Prepare.MLUSetup.QCPlugin"
    MSBProj_For_Consumption: 'build\create_MLU_Content.proj'
  needs:
    - job: UFT.Setup.ALMAndBTP
      artifacts: false
    - job: uft-build-compute-version
      artifacts: true
    - job: uft-build-env-setup
      artifacts: true

UFT.Prepare.MLUSetup.UFTSetup:
  allow_failure: true
  extends: .uft-msbuild-template
  stage: setup-prepare-mlu
  variables:
    MSBProj: 'build\create_MLU_Content.proj'
    MSBTarget: "PrepareUFTSetup_IHP2"
    JobName: "UFT.Prepare.MLUSetup.UFTSetup"
    MSBProj_For_Consumption: 'build\create_MLU_Content.proj'
  needs:
    - job: UFT.Setup.ALMAndBTP
      artifacts: false
    - job: uft-build-compute-version
      artifacts: true
    - job: uft-build-env-setup
      artifacts: true
