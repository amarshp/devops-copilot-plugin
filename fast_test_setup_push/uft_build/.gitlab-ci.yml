# fast_setup Pipeline — Resume from setup phase
# Skips all compilation before setup by reusing a reference build workspace.
# Generated by pipeline-phase-resumer skill.
#
# HOW TO UPDATE THE REFERENCE BUILD:
#   Set FAST_RESUME_REFERENCE_BUILD_NUMBER, _BUILD_VERSION, _DESTDIR below
#   to match the pipeline whose workspace you want to reuse.

default:
  tags:
    - windows

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - if: '$CI_PIPELINE_SOURCE == "api"'
    - if: '$CI_PIPELINE_SOURCE == "trigger"'

stages:
  - build-prepare
  - build-number
  - setup-alm-btp
  - setup-prepare-all
  - setup-bin-changes
  - setup-finalize
  - setup-create-wix
  - setup-publish

variables:
  # ── Jenkins-skipped job controls ────────────────────────────────────────
  SKIP_JENKINS_SKIPPED_JOBS:
    value: "true"
    description: "Set to false to run jobs that Jenkins had marked [skipped]"
  # ── fast-resume reuse controls ──────────────────────────────────────────
  FAST_RESUME_REUSE_PREVIOUS_BUILD:
    value: "true"
    description: "Set to false to run a full build instead of reusing a cached workspace"
  FAST_RESUME_REFERENCE_BUILD_NUMBER:
    value: "120"
    description: "BuildNumber from the reference pipeline (uft-build-compute-version job log)"
  FAST_RESUME_REFERENCE_BUILD_VERSION:
    value: "2026.3.0.120"
    description: "BuildVersion from the reference pipeline (Major.Minor.N.Postfix)"
  FAST_RESUME_REFERENCE_DESTDIR:
    value: "U:/2026.3.0.120"
    description: "DestDir on EC2 runner from the reference pipeline (forward slashes)"
  # ── pipeline variables (preserved from source) ─────────────────────────
  BuildLabel:
    value: "UFT_2026_3"
    description: "Build label (e.g. UFT_2026_3)"
  Branch:
    value: "master"
    description: "Source branch to checkout"
  BuildMajorVersion:
    value: "2026"
    description: "Build major version number (full year, e.g. 2026)"
  BuildMinorVersion:
    value: "3"
    description: "Build minor version number"
  BuildPostfix:
    value: "0"
    description: "Build postfix (usually 0)"
  SvcpackVersion:
    value: ""
    description: "Service pack version (empty for normal nightly builds)"
  Configuration:
    value: "win32_release"
    description: "Build configuration: win32_release or win32_debug"
  Type:
    value: "Nightly"
    description: "Build type: Nightly or CI"
  MSBuildVersion:
    value: "2015"
    description: "MSBuild toolset version"
  Compilation_Configuration:
    value: "Release"
    description: "Compilation configuration used by UFT.Compilation child jobs"
  CodeSign:
    value: "true"
    description: "Whether to code-sign artifacts"
  SignMethod:
    value: "AUJAS"
    description: "Code signing method: AUJAS, HPCSS, SignHP, or Default"
  MailToList:
    value: ""
    description: "Override email recipients (leave blank for default)"
  PatchID:
    value: ""
    description: "Optional patch identifier used when writing PatchNum.ini"
  repo_inclusion:
    value: ""
    description: "Restrict mgit checkout to matching repos (empty = all)"

include:
  - local: 'uft_build/ci/stages/INFRA.Net.Use.yml'
  - local: 'uft_build/ci/stages/uft-build-env-setup.yml'
  - local: 'uft_build/ci/stages/uft-build-compute-version.yml'
  - local: 'uft_build/ci/stages/INFRA.UFT.MSBuild.yml'
  - local: 'uft_build/ci/stages/UFT.BuildNumber.Creator.yml'
  - local: 'uft_build/ci/stages/fast-resume-bootstrap.yml'
  - local: 'uft_build/ci/stages/UFT.Setup.ALMAndBTP.yml'
  - local: 'uft_build/ci/stages/UFT.Prepare.AllSetup.yml'
  - local: 'uft_build/ci/stages/UFT.Generic.ChangeBinFiles.yml'
  - local: 'uft_build/ci/stages/UFT.Setup.Finalize.yml'
  - local: 'uft_build/ci/stages/UFT.Create.Setups.Wix.yml'
  - local: 'uft_build/ci/stages/UFT.Setup.Publish.yml'

