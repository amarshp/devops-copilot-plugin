# UFT.Prepare.AllSetup — Prepare all installer MSIs (6 parallel MSBuild prepare jobs)
# Jenkins: UFT.Prepare.AllSetup (MultiJobProject) — "06 - Prepare All Setups"
#   Phase "Prepare All Setups" (PARALLEL, 6 jobs):
#     UFT.Prepare.RepView.Setup       → PrepareUFTRepViewSetup_IHP2
#     UFT.Prepare.QCPlugin.Setup      → PrepareQCPluginSetup_IHP2
#     UFT.Prepare.ExtAccTool.Setup    → PrepareExtAccToolSetup_IHP2
#     UFT.Prepare.UFT.Setup           → PrepareUFTSetup_IHP2
#     UFT.Prepare.WebAddin.Setup      → PrepareWeb2AddinSetup_IHP2
#     UFT.Prepare.NetExtensibility    → PrepareDotNetExt_IHP2 (conditional on NetExtensibility=true)
#   All use MSBProj=build\create_msi.proj
#
# UFTSetup is split into 2 jobs:
#   UFT.Prepare.AllSetup.UFTSetup.PreFlight  — fast (~5 min): pre-create NAS dirs, validate P:\ paths
#   UFT.Prepare.AllSetup.UFTSetup            — slow (~90 min): actual MSBuild PrepareUFTSetup_IHP2

UFT.Prepare.AllSetup.RepView:
  allow_failure: false
  extends: .uft-msbuild-template
  stage: setup-prepare-all
  # RepView is the first job in the serialized AllSetup chain.
  # Kill stale MSBuild processes here — safe because no other MSBuild job
  # is running yet. Cross-stage jobs (e.g. ALMAndBTP) must NOT do this kill
  # because they can overlap with AllSetup jobs via needs-based scheduling.
  before_script:
    - |
      $procs = Get-Process -Name 'msbuild' -ErrorAction SilentlyContinue
      if ($procs) {
          Write-Host "Killing $($procs.Count) stale MSBuild process(es): $(($procs | ForEach-Object { $_.Id }) -join ', ')"
          $procs | Stop-Process -Force
          Start-Sleep -Seconds 3
      } else {
          Write-Host "No stale MSBuild processes — clean start."
      }
  variables:
    MSBProj: 'build\create_msi.proj'
    MSBTarget: "PrepareUFTRepViewSetup_IHP2"
    JobName: "UFT.Prepare.AllSetup.RepView"
    MSBProj_For_Consumption: 'build\create_msi.proj'
  needs:
    - job: uft-build-compute-version
      artifacts: true
    - job: uft-build-env-setup
      artifacts: true

UFT.Prepare.AllSetup.QCPlugin:
  allow_failure: false
  extends: .uft-msbuild-template
  stage: setup-prepare-all
  variables:
    MSBProj: 'build\create_msi.proj'
    MSBTarget: "PrepareQCPluginSetup_IHP2"
    JobName: "UFT.Prepare.AllSetup.QCPlugin"
    MSBProj_For_Consumption: 'build\create_msi.proj'
  needs:
    - job: uft-build-compute-version
      artifacts: true
    - job: uft-build-env-setup
      artifacts: true
    # Serialized after RepView to prevent concurrent writes to shared
    # U:\..\SetupBuilder\Output\UFT\Content\Win32\TARGETDIR\bin\ on a single runner.
    - job: UFT.Prepare.AllSetup.RepView
      artifacts: false

UFT.Prepare.AllSetup.ExtAccTool:
